version: '3.9'

services:
  # Central Control Plane - manages agent registration and user assignment
  control_plane:
    build:
      context: .
      dockerfile: Dockerfile.control_plane
    image: ifx-control-plane:latest
    container_name: ifx-control-plane
    ports:
      - "5000:5000"
    environment:
      CONTROL_PLANE_PORT: 5000
      LOG_LEVEL: INFO
    volumes:
      - ./runtime:/app/runtime
    networks:
      - ifx_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Redis Streams - message queue for per-user price ticks
  redis:
    image: redis:7-alpine
    container_name: ifx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ifx_network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Relay Agent #1 - Runs on VPS_A (handles up to 8 concurrent users)
  relay_agent_1:
    build:
      context: .
      dockerfile: Dockerfile.relay_agent
    image: ifx-relay-agent:latest
    container_name: ifx-relay-agent-1
    ports:
      - "8083:8083"
    environment:
      AGENT_ID: relay_agent_1
      AGENT_IP: relay_agent_1
      AGENT_PORT: 8083
      AGENT_CAPACITY: 8
      CONTROL_PLANE_URL: http://control_plane:5000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: INFO
    volumes:
      - ./runtime:/app/runtime
      - ./terminals:/app/terminals
    networks:
      - ifx_network
    depends_on:
      control_plane:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Relay Agent #2 - Scale-out: add more agents as needed
  relay_agent_2:
    build:
      context: .
      dockerfile: Dockerfile.relay_agent
    image: ifx-relay-agent:latest
    container_name: ifx-relay-agent-2
    ports:
      - "8084:8083"
    environment:
      AGENT_ID: relay_agent_2
      AGENT_IP: relay_agent_2
      AGENT_PORT: 8083
      AGENT_CAPACITY: 8
      CONTROL_PLANE_URL: http://control_plane:5000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: INFO
    volumes:
      - ./runtime:/app/runtime
      - ./terminals:/app/terminals
    networks:
      - ifx_network
    depends_on:
      control_plane:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:

networks:
  ifx_network:
    driver: bridge
